name: Generate Blog

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Optional topic to use for the blog post'
        required: false
        type: string
      to_email:
        description: 'Optional email address to send the blog post to'
        required: false
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run blog generation
        run: |
          CMD="python src/main.py"
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            CMD="$CMD --topic \"${{ github.event.inputs.topic }}\""
          fi
          if [ -n "${{ github.event.inputs.to_email }}" ]; then
            CMD="$CMD --to_email \"${{ github.event.inputs.to_email }}\""
          fi
          echo "Running: $CMD"
          eval $CMD
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
